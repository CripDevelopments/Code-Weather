<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rain">
  <style>
    @keyframes rain { 0%, 100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(12px); opacity: 0.55; } }
    .rain-drops { animation: rain 1.1s linear infinite; }
  </style>
  <ellipse cx="100" cy="72" rx="54" ry="30" fill="#cfd8dc"/>
  <ellipse cx="132" cy="66" rx="38" ry="24" fill="#eceff1"/>
  <g class="rain-drops">
    <line x1="60" y1="102" x2="52" y2="132" stroke="#42a5f5" stroke-width="5" stroke-linecap="round"/>
    <line x1="88" y1="98" x2="80" y2="138" stroke="#42a5f5" stroke-width="5" stroke-linecap="round"/>
    <line x1="116" y1="102" x2="108" y2="142" stroke="#42a5f5" stroke-width="5" stroke-linecap="round"/>
    <line x1="144" y1="98" x2="136" y2="138" stroke="#42a5f5" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
