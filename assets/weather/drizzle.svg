<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Drizzle">
  <style>
    @keyframes rain { 0%, 100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(10px); opacity: 0.5; } }
    .rain-drops { animation: rain 1.4s linear infinite; }
  </style>
  <ellipse cx="100" cy="78" rx="50" ry="28" fill="#eceff1"/>
  <ellipse cx="128" cy="72" rx="36" ry="22" fill="#ffffff"/>
  <g class="rain-drops">
    <line x1="72" y1="108" x2="66" y2="128" stroke="#64b5f6" stroke-width="4" stroke-linecap="round"/>
    <line x1="100" y1="112" x2="94" y2="132" stroke="#64b5f6" stroke-width="4" stroke-linecap="round"/>
    <line x1="128" y1="108" x2="122" y2="128" stroke="#64b5f6" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
